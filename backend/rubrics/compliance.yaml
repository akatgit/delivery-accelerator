# Compliance review rubric (BRD_v2.0.md section 13.6, 13.7)
domain: compliance
org_standard_categories:
  - cicd
  - organization_practices
weight: 0.10

# Universal 1-10 scoring anchors (section 13.1), shared by every dimension below.
_scoring_guide: &scoring_guide
  "1-2": "Not addressed. No meaningful coverage."
  "3-4": "Mentioned but inadequate. Critical gaps remain."
  "5-6": "Partially addressed. Lacks depth, specificity, or consistency."
  "7-8": "Well addressed. Solid coverage with minor gaps."
  "9-10": "Excellent. Comprehensive, specific, production-ready."

dimensions:
  - name: Data residency
    description: "Storage locations vs regulatory requirements"
    scoring_guide: *scoring_guide

  - name: Privacy
    description: "GDPR/CCPA readiness, consent management, right to deletion"
    scoring_guide: *scoring_guide

  - name: Regulatory
    description: "Industry-specific requirements (HIPAA, PCI-DSS, SOX)"
    scoring_guide: *scoring_guide

  - name: Data retention
    description: "Retention policies, automated purge mechanisms"
    scoring_guide: *scoring_guide

  - name: Auditability
    description: "Change tracking, access logs, compliance reporting"
    scoring_guide: *scoring_guide
