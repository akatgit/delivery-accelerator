# Architecture review rubric (BRD_v2.0.md section 13.2, 13.7)
domain: architecture
org_standard_categories:
  - coding
  - api_design
  - naming
  - repository_conventions
weight: 0.25

# Universal 1-10 scoring anchors (section 13.1), shared by every dimension below.
_scoring_guide: &scoring_guide
  "1-2": "Not addressed. No meaningful coverage."
  "3-4": "Mentioned but inadequate. Critical gaps remain."
  "5-6": "Partially addressed. Lacks depth, specificity, or consistency."
  "7-8": "Well addressed. Solid coverage with minor gaps."
  "9-10": "Excellent. Comprehensive, specific, production-ready."

dimensions:
  - name: Completeness
    description: "All components defined, interactions documented, data flows traceable"
    scoring_guide: *scoring_guide

  - name: Pattern consistency
    description: "Coherent architectural style, deviations justified"
    scoring_guide: *scoring_guide

  - name: Separation of concerns
    description: "Single-responsibility per component, clear bounded contexts"
    scoring_guide: *scoring_guide

  - name: Data architecture
    description: "Data ownership, consistency model, migration strategy"
    scoring_guide: *scoring_guide

  - name: API design
    description: "Contract clarity, versioning, error taxonomy, pagination"
    scoring_guide: *scoring_guide

  - name: Scalability design
    description: "Horizontal scaling per component, statelessness, bottleneck identification"
    scoring_guide: *scoring_guide
